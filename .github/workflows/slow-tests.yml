name: slow-tests
on:
  pull_request:
    branches:
      - 'master'
      - 'main'
      - '*release*'
      - 'release/**'
jobs:
  slow-tests-spark34:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TF_CPP_MIN_LOG_LEVEL: 3
      JAVA_OPTS: "-Xmx6144m -XX:+UseG1GC"
    name: Slow Tests on Apache Spark 3.4.x
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install OpenVINO Dependencies (oneTBB)
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libtbbmalloc2 libgomp1
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.4.0 numpy pytest
      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - name: Build Spark NLP
        run: |
          sbt -mem 6144 -Dis_spark34=true clean assemblyAndCopy
      
      - name: Check Initial Disk Space
        run: |
          echo "Initial disk usage:"
          df -h /
          echo ""
          echo "Home directory size:"
          du -sh ~ 2>/dev/null || true
      
      - name: Clean Existing Caches
        run: |
          echo "Cleaning any existing caches..."
          rm -rf ~/.cache_pretrained 2>/dev/null || true
          rm -rf ~/cache_pretrained 2>/dev/null || true
          rm -rf python/.pytest_cache 2>/dev/null || true
          echo "Cache cleanup complete"
      
      - name: Run Slow Python Tests File-by-File
        run: |
          cd python
          # Get all test files with slow tests
          TEST_FILES=$(python3.8 -m pytest --collect-only -m slow -q | grep "::" | cut -d':' -f1 | sort -u)
          
          TOTAL=$(echo "$TEST_FILES" | wc -l | tr -d ' ')
          CURRENT=0
          FAILED=0
          
          echo "Found $TOTAL test files to run"
          
          for test_file in $TEST_FILES; do
            CURRENT=$((CURRENT + 1))
            echo ""
            echo "=========================================="
            echo "[$CURRENT/$TOTAL] Running: $test_file"
            echo "=========================================="
            
            # Run each file in its own process
            if python3.8 -m pytest -v -m slow "$test_file"; then
              echo "✓ PASSED: $test_file"
            else
              echo "✗ FAILED: $test_file"
              FAILED=$((FAILED + 1))
            fi
            
            # AGGRESSIVE cleanup of all Spark NLP caches
            echo "Cleaning up caches..."
            
            # Remove all common Spark NLP cache locations
            rm -rf ~/.cache_pretrained 2>/dev/null || true
            rm -rf ~/cache_pretrained 2>/dev/null || true
            rm -rf /tmp/cache_pretrained 2>/dev/null || true
            rm -rf /home/runner/.cache_pretrained 2>/dev/null || true
            rm -rf /home/runner/cache_pretrained 2>/dev/null || true
            
            # Remove Spark temporary files
            rm -rf /tmp/spark-* 2>/dev/null || true
            rm -rf /tmp/blockmgr-* 2>/dev/null || true
            rm -rf /tmp/hadoop-* 2>/dev/null || true
            
            # Remove pytest cache
            rm -rf .pytest_cache 2>/dev/null || true
            
            # Find and remove any large cache directories
            find ~ -name "cache_pretrained" -type d -exec rm -rf {} + 2>/dev/null || true
            find /tmp -name "spark-*" -type d -mmin +5 -exec rm -rf {} + 2>/dev/null || true
            
            # Show disk usage
            echo "Disk usage after cleanup:"
            df -h / | tail -1
            
            # If disk is >90% full, do emergency cleanup
            DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            if [ "$DISK_USAGE" -gt 90 ]; then
              echo "⚠️  WARNING: Disk usage at ${DISK_USAGE}% - performing emergency cleanup"
              # Clean Docker images and containers
              docker system prune -af 2>/dev/null || true
              # Clean apt cache
              sudo apt-get clean 2>/dev/null || true
              sudo rm -rf /var/lib/apt/lists/* 2>/dev/null || true
              # Clean pip cache
              pip cache purge 2>/dev/null || true
              echo "After emergency cleanup:"
              df -h / | tail -1
            fi
            
            # Small delay for filesystem sync
            sleep 3
          done
          
          echo ""
          echo "=========================================="
          echo "Summary: $FAILED/$TOTAL test files failed"
          echo "=========================================="
          
          # Exit with error if any tests failed
          if [ $FAILED -gt 0 ]; then
            exit 1
          fi