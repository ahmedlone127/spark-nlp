name: slow-tests

on:
  pull_request:
    branches:
      - 'master'
      - 'main'
      - '*release*'
      - 'release/**'

jobs:
  slow-tests-spark34:
    runs-on: macos-15-intel
    continue-on-error: true
    strategy:
      matrix:
        # Split 100+ tests into 4 batches - each batch runs completely separately
        batch: [1, 2, 3, 4]
      fail-fast: false  # Let all batches complete even if one fails
    env:
      TF_CPP_MIN_LOG_LEVEL: 3
      JAVA_OPTS: "-Xmx6144m -XX:+UseG1GC"
    name: Slow Tests Batch ${{ matrix.batch }}/4 on Spark 3.4.x

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
          architecture: x64
      - name: Install OpenVINO Dependencies (oneTBB)
        run: |
          brew install tbb
          # Set library path so OpenVINO can find TBB
          echo "DYLD_LIBRARY_PATH=$(brew --prefix tbb)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.4.0 numpy pytest pytest-isolate pytest-split
      - name: Build Spark NLP
        run: |
          brew install sbt
          sbt -mem 6144 -Dis_spark34=true clean assemblyAndCopy
      - name: Run Slow Python Tests - Batch ${{ matrix.batch }}
        run: |
          cd python
          # pytest-split automatically divides tests into N groups
          python3.8 -m pytest -v -m slow \
            --isolate \
            --isolate-mem-limit=4294967296 \
            --isolate-timeout=6000 \
            --splits=4 \
            --group=${{ matrix.batch }}